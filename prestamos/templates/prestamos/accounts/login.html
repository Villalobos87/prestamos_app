{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Préstamos RG - Iniciar sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"  rel="stylesheet">
  <style>
    body {
      background: radial-gradient(circle at 20% 30%, #1e3c72, #2a5298, #0a0f2c);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-family: 'Poppins', sans-serif;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      backdrop-filter: blur(15px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
      padding: 2.5rem;
      width: 370px;
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .glass-card h4 {
      font-weight: 600;
      margin-bottom: 1rem;
      color: #fff;
    }

    .form-control {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      border-radius: 10px;
      color: white;
      padding: 0.8rem;
    }

    .form-control::placeholder {
      color: #ddd;
    }

    .btn-login {
      background: linear-gradient(135deg, #007bff, #2a5298);
      border: none;
      color: white;
      border-radius: 10px;
      padding: 0.6rem;
      font-weight: 600;
      transition: 0.3s;
      box-shadow: 0 0 10px rgba(0, 123, 255, 0.3);
    }

    .btn-login:hover {
      background: linear-gradient(135deg, #0056d2, #1e3c72);
      box-shadow: 0 0 20px rgba(0, 123, 255, 0.5);
    }

    .logo {
      width: 90px;
      margin-bottom: 1rem;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(0, 123, 255, 0.4);
    }

    .footer {
      font-size: 0.8rem;
      color: #ccc;
      margin-top: 1rem;
    }

    a {
      color: #9bbdfc;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <img src="{% static 'prestamos/img/rg_logo.jpeg' %}" alt="Logo RG" class="logo">
    <h4>Sistema de Préstamos RG</h4>

    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <input type="text" name="username" class="form-control" placeholder="Usuario" required>
      </div>
      <div class="mb-3">
        <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
      </div>
      <button type="submit" class="btn btn-login w-100">Entrar</button>
    </form>

    {% if messages %}
      <div class="alert alert-danger mt-3 p-2">
        {% for message in messages %}
          {{ message }}
        {% endfor %}
      </div>
    {% endif %}

    <div class="footer">
      <a href="#">¿Olvidaste tu contraseña?</a><br>
      © {{ now|date:"Y" }} Sistema RG
    </div>
  </div>
</body>
</html>
