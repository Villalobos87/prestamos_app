{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Préstamos RG - Acceso</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #0f172a, #020617);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      color: #e2e8f0;
      overflow: hidden;
    }

    /* MATRIX SUAVE */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      opacity: 0.08; /* 👈 clave: muy sutil */
    }

    .login-card {
      position: relative;
      z-index: 2;
      background: rgba(15, 23, 42, 0.92);
      border-radius: 16px;
      padding: 2.5rem;
      width: 360px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(34, 197, 94, 0.2);
      backdrop-filter: blur(10px);
    }

    .login-card h4 {
      font-weight: 600;
      color: #f8fafc;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 1.5rem;
    }

    .form-control {
      background: #020617;
      border: 1px solid #1e293b;
      color: #e2e8f0;
      border-radius: 10px;
      padding: 0.75rem;
      transition: 0.3s;
    }

    .form-control:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
      background: #020617;
      color: #fff;
    }

    .btn-login {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border: none;
      color: white;
      font-weight: 600;
      border-radius: 10px;
      padding: 0.65rem;
      transition: 0.3s;
    }

    .btn-login:hover {
      background: linear-gradient(135deg, #16a34a, #15803d);
      box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3);
    }

    .logo {
      width: 70px;
      margin-bottom: 10px;
      border-radius: 50%;
      border: 2px solid rgba(34, 197, 94, 0.4);
    }

    .footer {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 1.5rem;
      text-align: center;
    }

    .alert {
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      color: #f87171;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="login-card">

  <div class="text-center">
    <img src="{% static 'prestamos/img/rg_logo.jpeg' %}" class="logo">
    <h4>Sistema de Préstamos RG</h4>
    <div class="subtitle">Acceso seguro al sistema</div>
  </div>

  <form method="POST">
    {% csrf_token %}

    <div class="mb-3">
      <input type="text" name="username" class="form-control" placeholder="Usuario" required>
    </div>

    <div class="mb-3">
      <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
    </div>

    <button type="submit" class="btn btn-login w-100">Ingresar</button>
  </form>

  {% if messages %}
    <div class="alert mt-3 p-2 text-center">
      {% for message in messages %}
        {{ message }}
      {% endfor %}
    </div>
  {% endif %}

  <div class="footer">
    <a href="#">¿Olvidaste tu contraseña?</a><br>
    © {{ now|date:"Y" }} Sistema RG
  </div>

</div>

<script>
  const canvas = document.getElementById("matrix");
  const ctx = canvas.getContext("2d");

  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;

  const letters = "01";
  const fontSize = 14;
  const columns = canvas.width / fontSize;

  const drops = Array(Math.floor(columns)).fill(1);

  function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#22c55e"; // verde corporativo
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
      const text = letters[Math.floor(Math.random() * letters.length)];
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);

      if (drops[i] * fontSize > canvas.height && Math.random() > 0.98) {
        drops[i] = 0;
      }
      drops[i]++;
    }
  }

  setInterval(draw, 50); // más lento = más elegante
</script>

</body>
</html>
